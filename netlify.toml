[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20.19.0"
  NODE_ENV = "production"
  NPM_FLAGS = "--include=dev"

# NOTE: Do NOT add a catch-all SPA redirect for Next.js apps.
# Next.js handles all routing internally via the Netlify Next.js plugin.

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking - DENY is stricter than SAMEORIGIN
    X-Frame-Options = "DENY"
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    # Legacy XSS protection for older browsers
    X-XSS-Protection = "1; mode=block"
    # Limit referrer information leakage
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser feature access
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    # Force HTTPS for 1 year, include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content Security Policy - restrict resource origins
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' mailto:"
    # Remove server fingerprinting
    X-Powered-By = "SuccessionIO"

[[headers]]
  for = "/api/*"
  [headers.values]
    # Prevent caching of API responses
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Frame-Options = "DENY"
